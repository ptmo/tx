<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Tracker L1</title>
    <style>
        :root { --bg: #0b0f19; --accent: #00ffcc; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-notify { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tx-card { background: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,255,204,0.2); margin-bottom: 10px; animation: slideIn 0.5s ease-out; }
        .amount { color: var(--accent); font-size: 1.2rem; font-weight: bold; }
        .addresses { font-size: 0.8rem; color: #aaa; margin-top: 5px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h2>Radar Paus 🐋</h2>
        <!-- Browser modern mewajibkan interaksi klik user sebelum mengizinkan notifikasi -->
        <button class="btn-notify" onclick="requestNotificationPermission()">Aktifkan Notifikasi</button>
    </div>

    <div id="tx-list">
        <!-- Data transaksi akan muncul di sini -->
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 1. Meminta izin ke Android/Browser untuk mengirim Notifikasi Push
        function requestNotificationPermission() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        alert("Notifikasi berhasil diaktifkan! Biarkan tab ini terbuka di background.");
                    }
                });
            }
        }

        // 2. Menerima data dari server Node.js Render
        const socket = io();
        const txList = document.getElementById("tx-list");

        socket.on("whale_alert", (data) => {
            // Format angka agar rapi (misal: $1,250,000)
            const amountFormatted = data.amount.toLocaleString();

            // A. Tampilkan di UI Dashboard
            const card = document.createElement("div");
            card.className = "tx-card";
            card.innerHTML = `
                <div><span style="color:#fff;">${data.symbol}</span> TRANSFER</div>
                <div class="amount">$${amountFormatted}</div>
                <div class="addresses">
                    Dari: ${data.from.substring(0, 8)}...<br>
                    Ke: ${data.to.substring(0, 8)}...
                </div>
            `;
            txList.prepend(card); // Taruh di paling atas

            // B. Tembakkan Notifikasi Native Android
            if (Notification.permission === "granted") {
                const notif = new Notification(`🚨 Paus ${data.symbol} Terdeteksi!`, {
                    body: `$${amountFormatted} baru saja dipindahkan.`,
                    icon: "https://cryptologos.cc/logos/tether-usdt-logo.png", // Ikon notifikasi
                    vibrate: [200, 100, 200] // Membuat HP bergetar
                });

                // Jika notifikasi di-tap, buka Etherscan
                notif.onclick = function() {
                    window.open(`https://etherscan.io/tx/${data.txHash}`, "_blank");
                };
            }
        });
    </script>
</body>
</html>

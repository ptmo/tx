<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Tracker L1</title>
    <style>
        :root { --bg: #0b0f19; --accent: #00ffcc; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-notify { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tx-card { background: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,255,204,0.2); margin-bottom: 10px; animation: slideIn 0.5s ease-out; }
        .amount { color: var(--accent); font-size: 1.2rem; font-weight: bold; }
        .addresses { font-size: 0.8rem; color: #aaa; margin-top: 5px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           SISTEM PERINGATAN (WARNING LEVELS)
           ========================================= */
        
        /* Level 1: Paus Raksasa (> $1 Miliar) - Warning Ringan */
        .warning-light {
            border: 1px solid rgba(255, 165, 0, 0.5) !important;
            box-shadow: 0 0 15px rgba(255, 165, 0, 0.1);
        }
        .badge-light {
            background: rgba(255, 165, 0, 0.2);
            color: #ffaa00;
            border: 1px solid #ffaa00;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
        }

        /* Level 2: Monster Kelas Kakap (> $10 Miliar) - Warning Keras */
        .warning-hard {
            border: 1px solid rgba(255, 0, 0, 0.6) !important;
            background: rgba(255, 0, 0, 0.05) !important;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            animation: slideIn 0.5s ease-out, pulseRed 1.5s infinite !important;
        }
        .badge-hard {
            background: rgba(255, 0, 0, 0.2);
            color: #ff3333;
            border: 1px solid #ff3333;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
            animation: blinkText 1s infinite;
        }

        /* Keyframes untuk efek tegang di transaksi di atas $10 Miliar */
        @keyframes pulseRed {
            0% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
            50% { box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); }
            100% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
        }
        @keyframes blinkText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Radar Paus 🐋</h2>
        <!-- Browser modern mewajibkan interaksi klik user sebelum mengizinkan notifikasi -->
        <button class="btn-notify" onclick="requestNotificationPermission()">Aktifkan Notifikasi</button>
    </div>

    <div id="tx-list">
        <!-- Data transaksi akan muncul di sini -->
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const txList = document.getElementById("tx-list");

        // Fungsi pembantu agar tidak menulis kode HTML berulang-ulang (DRY Principle)
        function createCard(data) {
            const amountFormatted = data.amount.toLocaleString('en-US', { maximumFractionDigits: 0 });
            const card = document.createElement("div");
            card.className = "tx-card";

            // Variabel bawaan (Default: Cyan / Normal)
            let alertBadge = "";
            let amountColor = "var(--accent)"; 

            // Logika Deteksi Level Ancaman
            if (data.amount >= 10000000000) { 
                // Di atas $10 Miliar (Warning Keras)
                card.classList.add("warning-hard");
                amountColor = "#ff3333"; // Merah
                alertBadge = `<span class="badge-hard">🚨 CRITICAL WARNING</span>`;
                
            } else if (data.amount >= 1000000000) { 
                // Di atas $1 Miliar (Warning Ringan)
                card.classList.add("warning-light");
                amountColor = "#ffaa00"; // Oranye/Emas
                alertBadge = `<span class="badge-light">⚠️ MASSIVE WHALE</span>`;
            }

            // Template HTML yang disuntikkan
            card.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <span style="color:#fff;">${data.symbol}</span> &nbsp;TRANSFER 
                    ${alertBadge}
                </div>
                <div class="amount" style="color: ${amountColor};">$${amountFormatted}</div>
                <div class="addresses">
                    Dari: ${data.from.substring(0, 8)}...<br>
                    Ke: ${data.to.substring(0, 8)}...
                </div>
            `;
            return card;
        }

        // 1. TERIMA RIWAYAT SAAT REFRESH
        socket.on("history", (historyData) => {
            txList.innerHTML = ""; // Bersihkan layar dulu
            // Render semua riwayat dari server
            historyData.forEach(data => {
                txList.appendChild(createCard(data));
            });
        });

        // 2. TERIMA DATA BARU SECARA REAL-TIME
        socket.on("whale_alert", (data) => {
            txList.prepend(createCard(data)); // Taruh data baru di paling atas

            // Logika Notifikasi Android tetap berjalan
            if (Notification.permission === "granted") {
                const amountFormatted = data.amount.toLocaleString('en-US', { maximumFractionDigits: 0 });
                const notif = new Notification(`🚨 Paus ${data.symbol} Terdeteksi!`, {
                    body: `$${amountFormatted} baru saja dipindahkan.`,
                    icon: "https://cryptologos.cc/logos/tether-usdt-logo.png",
                    vibrate: [200, 100, 200]
                });

                notif.onclick = function() {
                    window.open(`https://etherscan.io/tx/${data.txHash}`, "_blank");
                };
            }
        });
    </script>
</body>
</html>
